<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional Brain Rehabilitation Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            font-family: 'Montserrat', sans-serif;
            color: #000000;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #F2F0EF;
        }
        #root {
            width: 1280px;
            height: 720px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
            border-radius: 16px;
        }
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in {
            animation: fade-in 1s ease-out forwards;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes slideInUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes slideInDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes slideInDownWithBg {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOutDown {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(100%);
                opacity: 0;
            }
        }
        
        @keyframes slideInFromRight {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }
        
        @keyframes slideOutToRight {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(100%);
            }
        }
        
        @keyframes dissolveIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes dissolveOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }
        
        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeSlideRight {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .animate-fade-slide-down {
            animation: fadeSlideDown 0.3s ease-out forwards;
        }
        
        .animate-fade-slide-up {
            animation: fadeSlideUp 0.25s ease-out forwards;
        }
        
        .animate-fade-slide-right {
            animation: fadeSlideRight 0.3s ease-out forwards;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        .animate-fade-in-delay {
            animation: fadeIn 0.4s ease-out 0.2s forwards;
            opacity: 0;
        }
        
        /* Slide transitions for audience sections (slide over intro) */
        .slide-in-up {
            transform: translateY(0);
        }
        
        .slide-out-down {
            animation: slideDownToBottom 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        .slide-from-bottom {
            animation: slideUpFromBottom 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideDownToBottom {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(100%);
            }
        }

        @keyframes slideUpFromBottom {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        @keyframes slideBannerDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideSubmenuUp {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-banner-in {
            animation: slideBannerDown 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .animate-submenu-in {
            animation: slideSubmenuUp 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Lucide React icon components
        const Play = ({ className }) => (

        const X = ({ className }) => (

                <line x1="18" y1="6" x2="6" y2="18"></line>

        const Shield = ({ className }) => (

        const Users = ({ className, style }) => (

                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>

        const Lightbulb = ({ className, style }) => (
            <svg className={className} style={style} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"></path>

        const Building2 = ({ className, style }) => (

        const Clock = ({ className, style }) => (

        const Eye = ({ className, style }) => (

                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        );

        const Clipboard = ({ className, style }) => (
            <svg className={className} style={style} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
            </svg>
        );

        const FileText = ({ className, style }) => (
            <svg className={className} style={style} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        );

        const TrendingUp = ({ className, style }) => (
            <svg className={className} style={style} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        const Disc = ({ className, style }) => (
            <svg className={className} style={style} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        );

        const Download = ({ className, style }) => (
            <svg className={className} style={style} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );

        const Calendar = ({ className, style }) => (
            <svg className={className} style={style} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        // Reusable Banner Component
        const Banner = ({ title, subtitle = null, showBanner, onLogoClick, onNavigate, shouldAnimate = true, showTreatmentFinder = false, onTreatmentFinderClick = null }) => (
            <div 
                className={`absolute top-0 left-0 right-0 bg-white backdrop-blur-2xl text-slate-800 px-8 z-20 ${showBanner && shouldAnimate ? 'animate-banner-in' : ''}`}
                style={{
                    height: '100px', 
                    boxShadow: '0 2px 8px rgba(0, 0, 0, 0.1)',
                    opacity: showBanner ? 1 : 0,
                    transform: showBanner ? 'translateY(0)' : 'translateY(-100%)',
                    transition: shouldAnimate ? undefined : 'none'
                }}
            >
                <div className="flex items-start justify-between h-full pt-2">
                    {/* Left - Clickable Logo */}
                    <button 
                        onClick={onLogoClick}
                        className="flex items-center gap-2 hover:opacity-80 transition-opacity group flex-shrink-0"
                    >
                        <img 
                            src="https://raw.githubusercontent.com/stevebutton/brainmoove-prototype/main/gfx/newlogo.jpg" 
                            alt="BrainMoov Logo" 
                            className="group-hover:scale-110 transition-transform" 
                            style={{width: '113px', height: '80px', objectFit: 'contain'}} 
                        />
                    </button>
                    
                    {/* Center - Title and Navigation */}
                    <div className="flex-1 flex flex-col items-start" style={{paddingTop: '14px', paddingLeft: '20px'}}>
                        {/* Section Title */}
                        <div key={title} className="animate-fade-slide-down">
                            <h2 className="text-3xl font-bold whitespace-nowrap">{title}</h2>
                        </div>
                        
                        {/* Navigation Menu - Below Title */}
                        {onNavigate && (
                            <div className="flex gap-6 mt-1">
                                <button 
                                    onClick={() => onNavigate('about')}
                                    className="text-sm font-medium hover:underline transition-all"
                                >
                                    What is BrainMoove?
                                </button>
                                <button 
                                    onClick={() => onNavigate('who-detail')}
                                    className="text-sm font-medium hover:underline transition-all"
                                >
                                    Who We Treat
                                </button>
                                <button 
                                    onClick={() => onNavigate('what-detail')}
                                    className="text-sm font-medium hover:underline transition-all"
                                >
                                    What We Treat
                                </button>
                                <button 
                                    onClick={() => onNavigate('process-detail')}
                                    className="text-sm font-medium hover:underline transition-all"
                                >
                                    Our Treatment Process
                                </button>
                            </div>
                        )}
                    </div>
                    
                    {/* Right - Subtitle or Treatment Finder Button */}
                    <div className="flex items-start gap-3 flex-shrink-0" style={{paddingTop: '14px'}}>
                        {showTreatmentFinder && onTreatmentFinderClick ? (
                            <button
                                onClick={onTreatmentFinderClick}
                                className="flex items-center gap-2 bg-gradient-to-r from-purple-100 via-blue-100 to-cyan-100 hover:from-purple-200 hover:via-blue-200 hover:to-cyan-200 border border-blue-300 rounded-xl px-4 py-2 transition-all hover:scale-105 shadow-md"
                            >
                                <div className="bg-blue-600 rounded-full p-1.5">
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" style={{stroke: '#ffffff'}}>
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                    </svg>
                                </div>

                            </button>
                        ) : subtitle ? (
                            <div key={subtitle} className="animate-fade-slide-right">

                        ) : null}

        );

        function RehabCenterInterface() {
            const [currentView, setCurrentView] = useState('intro');
            const [showNav, setShowNav] = useState(false);
            const [videoPlaying, setVideoPlaying] = useState({});
            const [transitioning, setTransitioning] = useState(false);
            const [slideDirection, setSlideDirection] = useState('in');
            const [selectedService, setSelectedService] = useState(null);
            const [carouselIndex, setCarouselIndex] = useState(0);
            const [selectedTechService, setSelectedTechService] = useState(null);
            const [isFirstVideoOpen, setIsFirstVideoOpen] = useState(true);
            const [isClosingVideo, setIsClosingVideo] = useState(false);
            const [isClosingCards, setIsClosingCards] = useState(false);
            const [lastTechService, setLastTechService] = useState(null);
            const [previousView, setPreviousView] = useState(null);
            const [showBanner, setShowBanner] = useState(false);
            const [shouldAnimateBanner, setShouldAnimateBanner] = useState(true);
            const [selectedMachine, setSelectedMachine] = useState(0);
            const [showQuestionnaire, setShowQuestionnaire] = useState(false);
            const [showAboutPrototype, setShowAboutPrototype] = useState(false);
            const [showCarousel, setShowCarousel] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [questionnaireStep, setQuestionnaireStep] = useState(0);
            const [questionnaireAnswers, setQuestionnaireAnswers] = useState({
                audience: null,
                reason: null,
                symptoms: [],
                goals: [],
                experience: null
            });
            const [showSubmenu, setShowSubmenu] = useState(false);
            const [showConditionsPanel, setShowConditionsPanel] = useState(false);
            const [hoveredSection, setHoveredSection] = useState(null);
            const [hoveredCategory, setHoveredCategory] = useState(null);
            const [hoveredAudience, setHoveredAudience] = useState(null);
            const [hoveredProcessStep, setHoveredProcessStep] = useState(null);
            const [selectedProcessVideo, setSelectedProcessVideo] = useState(null);

            useEffect(() => {
                if (currentView === 'intro') {
                    const timer = setTimeout(() => setShowNav(true), 1500);
                    return () => clearTimeout(timer);
                }
            }, [currentView]);

            // Trigger sequential animations when entering audience section
            useEffect(() => {
                if (currentView !== 'intro' && currentView !== null) {
                    // Reset selected machine when entering Infrastructure page
                    if (currentView === 'about-infrastructure') {
                        setSelectedMachine(0);
                    }
                    
                    // Check if we're transitioning between about subsections
                    const aboutSubsections = ['about-philosophy', 'about-objectives', 'about-team', 'about-infrastructure', 'about-history'];
                    const isCurrentAboutSub = aboutSubsections.includes(currentView);
                    const isPreviousAboutSub = aboutSubsections.includes(previousView);
                    const isAboutToAboutTransition = isCurrentAboutSub && isPreviousAboutSub;
                    
                    if (isAboutToAboutTransition) {
                        // Moving between about subsections - banner stays visible, no animation
                        setShouldAnimateBanner(false);
                        setShowBanner(true);
                    } else {
                        // Coming from elsewhere - animate banner in
                        setShouldAnimateBanner(true);
                        setShowBanner(false);
                        setShowSubmenu(false);
                        
                        // Banner slides in after 1000ms
                        const bannerTimer = setTimeout(() => {
                            setShowBanner(true);
                        }, 1000);
                        
                        // Submenu slides in after banner completes (1000ms + 1000ms = 2000ms)
                        const submenuTimer = setTimeout(() => {
                            setShowSubmenu(true);
                        }, 2000);
                        
                        return () => {
                            clearTimeout(bannerTimer);
                            clearTimeout(submenuTimer);
                        };
                    }
                }
            }, [currentView, previousView]);

            const handleViewChange = (newView) => {
                // Check if any panels are open
                const hasVideoOpen = selectedTechService !== null;
                const hasCardsOpen = selectedService !== null;
                
                if (hasVideoOpen || hasCardsOpen) {
                    // Store current view BEFORE any state changes
                    const viewToTransitionFrom = currentView;
                    
                    // Set up the slide-out transition FIRST (before closing panels)
                    if (newView === 'intro') {
                        setPreviousView(viewToTransitionFrom);
                        setShowNav(true);
                        
                        // Use requestAnimationFrame to ensure browser has painted before triggering animation
                        requestAnimationFrame(() => {

                        setSelectedTechService(null);
                        setIsClosingVideo(false);

                            setIsFirstVideoOpen(true);
                            setTransitioning(false);

                            setIsFirstVideoOpen(true);

                    audienceNote = 'senior-focused and age-appropriate';

                return {
                    primaryMessage,
                    audienceNote,
                    recommendedServices: recommendedServices.slice(0, 4),
                    recommendedTechnologies: recommendedTechnologies.length > 0 ? recommendedTechnologies : ['gyrostim', 'tova'],

                                        <div className="w-full bg-white/20 rounded-full h-2">
                                            <div 
                                                className="bg-white h-2 rounded-full transition-all duration-300"
                                                style={{width: `${((currentSlide + 1) / totalSlides) * 100}%`}}
                                            ></div>
                                        </div>
                                    </div>
                                    
                                    <div className="p-8 overflow-y-auto" style={{maxHeight: 'calc(90vh - 200px)'}}>
                                        {currentSlideData.type === 'welcome' && (
                                            <div className="text-center py-8">
                                                <img 
                                                    src="https://raw.githubusercontent.com/stevebutton/brainmoove-prototype/main/gfx/newlogo.jpg" 
                                                    alt="BrainMoove Logo" 
                                                    className="mx-auto mb-6" 
                                                    style={{width: '150px', height: '107px', objectFit: 'contain'}} 
                                                />
                                                <h3 className="text-3xl font-bold text-slate-800 mb-3">{currentSlideData.title}</h3>
                                                <p className="text-lg text-purple-600 mb-4 font-semibold">{currentSlideData.subtitle}</p>
                                                <p className="text-slate-700 max-w-2xl mx-auto text-lg">{currentSlideData.content}</p>
                                            </div>
                                        )}
                                        
                                        {currentSlideData.type === 'situation' && (
                                            <div className="py-6">
                                                <div className="text-center mb-8">
                                                    <img 
                                                        src="https://raw.githubusercontent.com/stevebutton/brainmoove-prototype/main/gfx/newlogo.jpg" 
                                                        alt="BrainMoove Logo" 
                                                        className="mx-auto mb-4" 
                                                        style={{width: '120px', height: '85px', objectFit: 'contain'}} 
                                                    />
                                                    <h3 className="text-2xl font-bold text-slate-800 mb-2">{currentSlideData.title}</h3>
                                                </div>
                                                <div className="space-y-4 max-w-xl mx-auto">
                                                    {currentSlideData.items.map((item, idx) => (
                                                        <div key={idx} className="bg-gradient-to-r from-blue-50 to-purple-50 border-2 border-blue-200 rounded-xl p-5">
                                                            <div className="text-sm font-bold text-blue-800 mb-1">{item.label}</div>
                                                            <div className="text-slate-800 text-lg">{item.value}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {currentSlideData.type === 'service' && (
                                            <div className="py-4">
                                                <div className="text-center mb-6">
                                                    <img 
                                                        src="https://raw.githubusercontent.com/stevebutton/brainmoove-prototype/main/gfx/newlogo.jpg" 
                                                        alt="BrainMoove Logo" 
                                                        className="mx-auto mb-4" 
                                                        style={{width: '100px', height: '71px', objectFit: 'contain'}} 
                                                    />
                                                    <h3 className="text-2xl font-bold text-slate-800 mb-2">{currentSlideData.title}</h3>
                                                    <p className="text-purple-600 font-semibold">{currentSlideData.subtitle}</p>
                                                </div>
                                                
                                                <div className="bg-gradient-to-br from-slate-100 to-slate-200 rounded-2xl p-12 mb-6 text-center border-2 border-slate-300">
                                                    <div className="text-5xl mb-3">🎥</div>
                                                    <p className="text-slate-700 font-bold mb-2 text-lg">Specialist Video Explanation</p>
                                                    <p className="text-slate-600 mb-4">Raphaël Royer explains {currentSlideData.title.toLowerCase()}</p>
                                                </div>
                                                
                                                <div className="max-w-2xl mx-auto">
                                                    <p className="text-slate-700 text-lg mb-4 leading-relaxed">{currentSlideData.description}</p>
                                                </div>
                                            </div>
                                        )}
                                        
                                        {currentSlideData.type === 'technology' && (
                                            <div className="py-4">
                                                <div className="text-center mb-6">
                                                    <img 
                                                        src="https://raw.githubusercontent.com/stevebutton/brainmoove-prototype/main/gfx/newlogo.jpg" 
                                                        alt="BrainMoove Logo" 
                                                        className="mx-auto mb-4" 
                                                        style={{width: '100px', height: '71px', objectFit: 'contain'}} 
                                                    />
                                                    <h3 className="text-2xl font-bold text-slate-800 mb-2">{currentSlideData.title}</h3>
                                                    <p className="text-purple-600 font-semibold">{currentSlideData.subtitle}</p>
                                                </div>
                                                
                                                <div className="bg-gradient-to-br from-cyan-50 to-blue-50 rounded-2xl p-12 mb-6 text-center border-2 border-cyan-300">
                                                    <div className="text-5xl mb-3">🎬</div>
                                                    <p className="text-slate-700 font-bold mb-2 text-lg">Technology Demonstration</p>
                                                    <p className="text-slate-600 mb-4">See {currentSlideData.title} in action</p>
                                                </div>
                                                
                                                <div className="max-w-2xl mx-auto">
                                                    <p className="text-slate-700 text-lg mb-4 leading-relaxed">{currentSlideData.description}</p>
                                                </div>
                                            </div>
                                        )}
                                        
                                        {currentSlideData.type === 'timeline' && (
                                            <div className="py-4">
                                                <div className="text-center mb-8">
                                                    <img 
                                                        src="https://raw.githubusercontent.com/stevebutton/brainmoove-prototype/main/gfx/newlogo.jpg" 
                                                        alt="BrainMoove Logo" 
                                                        className="mx-auto mb-4" 
                                                        style={{width: '120px', height: '85px', objectFit: 'contain'}} 
                                                    />
                                                    <h3 className="text-2xl font-bold text-slate-800 mb-2">{currentSlideData.title}</h3>
                                                    <p className="text-slate-600">{currentSlideData.subtitle}</p>
                                                </div>
                                                
                                                <div className="max-w-2xl mx-auto">
                                                    <div className="space-y-4">
                                                        {currentSlideData.phases.map((phase, idx) => (
                                                            <div key={idx} className="flex gap-4 items-start">
                                                                <div className="flex-shrink-0 w-12 h-12 bg-gradient-to-br from-purple-600 to-blue-600 text-white rounded-full flex items-center justify-center font-bold text-lg">
                                                                    {idx + 1}
                                                                </div>
                                                                <div className="flex-1 bg-white border-2 border-slate-200 rounded-xl p-4">
                                                                    <div className="text-xs font-bold text-purple-600 mb-1 uppercase tracking-wide">{phase.week}</div>
                                                                    <div className="font-bold text-slate-800 text-lg mb-1">{phase.activity}</div>
                                                                    <div className="text-slate-600">{phase.description}</div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        
                                        {currentSlideData.type === 'cta' && (
                                            <div className="text-center py-8">
                                                <img 
                                                    src="https://raw.githubusercontent.com/stevebutton/brainmoove-prototype/main/gfx/newlogo.jpg" 
                                                    alt="BrainMoove Logo" 
                                                    className="mx-auto mb-6" 
                                                    style={{width: '150px', height: '107px', objectFit: 'contain'}} 
                                                />
                                                <h3 className="text-3xl font-bold text-slate-800 mb-4">{currentSlideData.title}</h3>
                                                <div className="bg-gradient-to-r from-purple-50 to-blue-50 border-2 border-purple-200 rounded-2xl p-6 mb-6 max-w-2xl mx-auto">
                                                    <h4 className="text-xl font-bold text-slate-800 mb-2">{currentSlideData.subtitle}</h4>
                                                    <p className="text-slate-700 text-lg">{currentSlideData.summary}</p>
                                                </div>
                                                
                                                <div className="space-y-3 max-w-md mx-auto">
                                                    <button
                                                        onClick={() => {
                                                            setShowCarousel(false);
                                                            alert('Consultation booking coming soon!');
                                                        }}
                                                        className="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all flex items-center justify-center gap-2"
                                                    >
                                                        <Calendar className="w-5 h-5" />
                                                        Book Free Consultation
                                                    </button>
                                                    <button
                                                        onClick={() => setShowCarousel(false)}
                                                        className="w-full bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 px-6 rounded-xl border-2 border-slate-300"
                                                    >
                                                        Return to Summary
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="flex items-center justify-between px-8 py-5 border-t-2 border-slate-200 bg-slate-50 rounded-b-3xl">
                                        <button
                                            onClick={() => setCurrentSlide(Math.max(0, currentSlide - 1))}
                                            disabled={currentSlide === 0}
                                            className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold transition-all ${
                                                currentSlide === 0 ? 'text-slate-400 cursor-not-allowed' : 'text-slate-700 hover:bg-white hover:shadow'
                                            }`}
                                        >
                                            <ChevronLeft className="w-5 h-5" />
                                            Previous
                                        </button>
                                        
                                        <div className="flex gap-2">
                                            {carouselSlides.map((_, idx) => (
                                                <button
                                                    key={idx}
                                                    onClick={() => setCurrentSlide(idx)}
                                                    className={`transition-all rounded-full ${
                                                        idx === currentSlide ? 'bg-purple-600 w-8 h-3' : 'bg-slate-300 hover:bg-slate-400 w-3 h-3'
                                                    }`}
                                                ></button>
                                            ))}
                                        </div>
                                        
                                        <button
                                            onClick={() => setCurrentSlide(Math.min(totalSlides - 1, currentSlide + 1))}
                                            disabled={currentSlide === totalSlides - 1}
                                            className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold transition-all ${
                                                currentSlide === totalSlides - 1 ? 'text-slate-400 cursor-not-allowed' : 'text-slate-700 hover:bg-white hover:shadow'
                                            }`}
                                        >
                                            Next
                                            <ChevronRight className="w-5 h-5" />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* Floating About Prototype Button */}
                    <button
                        onClick={() => setShowAboutPrototype(true)}
                        className="fixed bottom-6 right-6 bg-slate-800 hover:bg-slate-700 text-white px-4 py-3 rounded-xl shadow-lg transition-all hover:scale-105 flex items-center gap-2 z-40"
                        style={{fontSize: '14px', color: '#ffffff'}}
                    >
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" style={{stroke: '#ffffff'}}>
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                        <span style={{color: '#ffffff'}}>About This Prototype</span>
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RehabCenterInterface />);
    </script>
